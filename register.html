<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt – ZenitChk</title>
    <script src="security.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-crown" style="font-size:48px;color:#f0b90b;"></i>
        </div>
        <h1 class="auth-title">Hesap Oluştur</h1>
        <p class="auth-subtitle">Kayıt olmaya hazır mısın?</p>
        <div id="registerError" class="auth-error"><i class="fas fa-exclamation-circle"></i><span id="registerErrorText">Hata</span></div>
        <div id="registerSuccess" class="auth-success"><i class="fas fa-check-circle"></i><span id="registerSuccessText">Başarılı!</span></div>
        <form id="registerForm">
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="registerEmail" placeholder="ornek@email.com" required />
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="registerPassword" placeholder="••••••••" required />
            </div>
            <div class="form-group">
                <label>Kayıt Anahtarı</label>
                <input type="text" id="registerKey" placeholder="Admin'den aldığın anahtar" required />
                <div class="hint"><i class="fas fa-key"></i> Admin panelinden alınan anahtar.</div>
            </div>
            <button type="submit" class="auth-btn">Kayıt Ol</button>
        </form>
        <div class="auth-toggle">Zaten hesabın var mı? <a href="index.html">Giriş Yap</a></div>
    </div>
    <audio id="bgMusic" loop></audio>
    <script>
        (function() {
            const songs = ['Dertlimusic.mp3', 'Allahyok.mp3', 'Tamam.mp3'];
            const randomSong = songs[Math.floor(Math.random() * songs.length)];
            const audio = document.getElementById('bgMusic');
            audio.src = randomSong;
            audio.volume = 0.3;
            document.addEventListener('click', function() {
                if (audio.paused) audio.play();
            }, { once: true });
        })();
    </script>
    <script src="auth.js"></script>
</body>
</html>
