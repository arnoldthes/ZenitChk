<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – ZenitChk !</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="security.js"></script>
</head>
<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fab fa-discord" style="font-size:48px;color:#5865F2;"></i>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Ready to join? Let's get started.</p>
        <div id="registerError" class="auth-error"><i class="fas fa-exclamation-circle"></i><span id="registerErrorText">Error</span></div>
        <div id="registerSuccess" class="auth-success"><i class="fas fa-check-circle"></i><span id="registerSuccessText">Success!</span></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="example@email.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="••••••••" required />
            </div>
            <div class="form-group">
                <label>Registration Key</label>
                <input type="text" id="registerKey" placeholder="Enter key from admin" required />
                <div class="hint"><i class="fas fa-key"></i> Get from admin panel.</div>
            </div>
            <button type="submit" class="auth-btn">Register</button>
        </form>
        <div class="auth-toggle">Already have an account? <a href="index.html">Login</a></div>
    </div>
    <audio id="bgMusic" loop></audio>
    <script>
        (function() {
            const songs = ['Dertlimusic.mp3', 'Allahyok.mp3', 'Tamam.mp3', 'Ehlan.mp3', 'Anani.mp3', 'Feryat.mp3', 'Vuruldu.mp3'];
            const randomSong = songs[Math.floor(Math.random() * songs.length)];
            const audio = document.getElementById('bgMusic');
            audio.src = randomSong;
            audio.volume = 0.3;
            document.addEventListener('click', function() {
                if (audio.paused) audio.play();
            }, { once: true });
        })();
    </script>
    <script src="auth.js"></script>
</body>
</html>
