<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-crown" style="font-size:48px;color:#f0b90b;"></i>
        </div>
        <h1 class="auth-title">ZenitChk</h1>
        <p class="auth-subtitle">Hesabına giriş yaparak devam et.</p>
        <div id="loginError" class="auth-error"><i class="fas fa-exclamation-circle"></i><span id="loginErrorText">Hata</span></div>
        <form id="loginForm">
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="loginEmail" placeholder="ornek@email.com" required />
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="auth-btn">Giriş Yap</button>
        </form>
        <div class="auth-toggle">Hesabın yok mu? <a href="register.html">Kayıt Ol</a></div>
    </div>
    <audio id="bgMusic" loop></audio>
    <script>
        // RANDOM MÜZİK
        (function() {
            const songs = ['Dertlimusic.mp3', 'Allahyok.mp3', 'Tamam.mp3', 'Ehlan.mp3', 'Anani.mp3', 'Feryat.mp3', 'Vuruldu.mp3'];
            const randomSong = songs[Math.floor(Math.random() * songs.length)];
            const audio = document.getElementById('bgMusic');
            audio.src = randomSong;
            audio.volume = 0.3;
            document.addEventListener('click', function() {
                if (audio.paused) audio.play();
            }, { once: true });
        })();
    </script>
