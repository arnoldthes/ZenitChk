<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOWER#2025 – Giriş</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">
            <svg viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="16" fill="#007aff"/><path d="M32 20.5C34.5 17.5 38 15.5 41.5 16C42 19.5 40 23 37.5 25.5C35 28 31.5 29 29 26.5C26.5 24 25.5 20.5 28 17.5C28.5 17 29 16.5 29.5 16.5C29.5 16.5 29 18 29 19.5C29 21.5 30.5 22.5 32 20.5Z" fill="white"/><path d="M39.5 42.5C37.5 45.5 34.5 47 32 47C29.5 47 27 45.5 25 43C23 40.5 21.5 37.5 21.5 34.5C21.5 28.5 25.5 24 30 24C32.5 24 34.5 25.5 36 27.5C37.5 25.5 39.5 24 42 24C45.5 24 48.5 26.5 48.5 31.5C48.5 35 46.5 38.5 43.5 41.5C42 43 41 44.5 39.5 42.5Z" fill="white"/></svg>
        </div>
        <h1 class="auth-title">Giriş Yap</h1>
        <p class="auth-subtitle">Hesabına giriş yaparak devam et.</p>
        <div id="loginError" class="auth-error"><i class="fas fa-exclamation-circle"></i><span id="loginErrorText">Hata</span></div>
        <form id="loginForm">
            <div class="form-group">
                <label>E‑posta</label>
                <input type="email" id="loginEmail" placeholder="ornek@email.com" required />
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="auth-btn">Giriş Yap</button>
        </form>
        <div class="auth-toggle">Hesabın yok mu? <a href="register.html">Kayıt Ol</a></div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
